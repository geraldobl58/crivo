# ═══════════════════════════════════════════════════════════════════════════════
# crivo PLATFORM - Docker Compose (Development)
# ═══════════════════════════════════════════════════════════════════════════════
services:
  # ════════════════════════════════════════════════════════════════════════════
  # 🗄️  PostgreSQL - Banco de Dados
  # ════════════════════════════════════════════════════════════════════════════
  # Bancos criados automaticamente:
  #   - crivo_keycloak: Para o Keycloak (Identity & Access Management)
  #   - crivo_app: Para a aplicação crivo (Backend)
  # ════════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: crivo-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crivo_db
      POSTGRES_USER: crivo
      POSTGRES_PASSWORD: crivo_password
      # PGDATA em subdiretório evita conflito com ._* metadata do macOS
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/crivo-auth/local/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - crivo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crivo -d crivo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"

  # ════════════════════════════════════════════════════════════════════════════
  #  Keycloak - Identity & Access Management
  # ════════════════════════════════════════════════════════════════════════════
  # Conexão: jdbc:postgresql://postgres:5432/crivo_keycloak
  # ════════════════════════════════════════════════════════════════════════════
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: crivo-auth-dev
    command:
      - start-dev
      - --http-port=8080
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      # Admin credentials (novas variáveis do Keycloak 26)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # Database (PostgreSQL) - Banco separado para Keycloak
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/crivo_keycloak
      KC_DB_USERNAME: crivo
      KC_DB_PASSWORD: crivo_password

      # HTTP Only - Sem HTTPS em desenvolvimento
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: http://localhost:8080
      KC_PROXY_HEADERS: xforwarded

      # Health/Metrics
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      # Theme hot-reload
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"

      # Logging
      KC_LOG_LEVEL: INFO
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./apps/crivo-auth/themes:/opt/keycloak/themes
    networks:
      - crivo-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ════════════════════════════════════════════════════════════════════════════
  # 🌐 Kong API Gateway (DB-less / Declarative Mode)
  # ════════════════════════════════════════════════════════════════════════════
  # Proxy: http://localhost:8000  (tráfego das apps)
  # Admin API: http://localhost:8001  (gerenciamento / debug)
  # ════════════════════════════════════════════════════════════════════════════
  kong:
    image: kong:3.9
    container_name: crivo-kong-dev
    restart: unless-stopped
    ports:
      - "8000:8000" # Proxy HTTP (frontend aponta aqui)
      - "8443:8443" # Proxy HTTPS (produção)
      - "8001:8001" # Admin API (dev only)
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled
      # Trusted IPs para real client IP (Docker network)
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: "X-Forwarded-For"
      KONG_REAL_IP_RECURSIVE: "on"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    networks:
      - crivo-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ════════════════════════════════════════════════════════════════════════════
  # 📊 Konga — Kong Admin UI
  # ════════════════════════════════════════════════════════════════════════════
  # UI para visualizar services, routes, plugins e status do Kong.
  # Em DB-less mode: somente leitura (config vive em kong.yml).
  # Acesso: http://localhost:1337
  # ════════════════════════════════════════════════════════════════════════════
  konga:
    image: pantsel/konga:0.14.9
    container_name: crivo-konga-dev
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      DB_ADAPTER: localDiskDb
      TOKEN_SECRET: crivo-konga-dev-secret
    volumes:
      - konga-data:/app/kongadata
    networks:
      - crivo-network
    depends_on:
      kong:
        condition: service_healthy

# ═══════════════════════════════════════════════════════════════════════════════
# 🌐 Networks
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  crivo-network:
    driver: bridge
    name: crivo-network

# ═══════════════════════════════════════════════════════════════════════════════
# 💾 Volumes - Gerenciados pelo Docker (armazenados localmente no Mac)
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  postgres-data:
    name: crivo-postgres-data
  keycloak-data:
    name: crivo-keycloak-data
  konga-data:
    name: crivo-konga-data
