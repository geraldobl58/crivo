# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Kong API Gateway — Declarative Configuration (DB-less mode)               ║
# ║  Proxy: http://localhost:8000 | Admin: http://localhost:8001               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
_format_version: "3.0"
_transform: true

# ══════════════════════════════════════════════════════════════════════════════
# Services — Upstream backends
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Crivo Backend API ────────────────────────────────────────────────────
  - name: crivo-api
    url: http://host.docker.internal:3333
    connect_timeout: 10000
    write_timeout: 60000
    read_timeout: 60000
    retries: 2

    routes:
      # Stripe Webhook — rate limit mais alto (eventos legítimos do Stripe)
      - name: crivo-stripe-webhook
        paths:
          - /api/stripe/webhook
        methods:
          - POST
        strip_path: true
        preserve_host: false
        protocols:
          - http
          - https
        plugins:
          - name: rate-limiting
            config:
              minute: 1000
              policy: local
              fault_tolerant: true

      # API principal — todas as rotas do backend
      - name: crivo-api-routes
        paths:
          - /api
        strip_path: true
        preserve_host: false
        protocols:
          - http
          - https

      # Swagger — acesso direto sem /api prefix
      - name: crivo-docs
        paths:
          - /docs
        strip_path: false
        preserve_host: false
        protocols:
          - http

    plugins:
      # Rate Limiting (por IP, janela deslizante)
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          error_code: 429
          error_message: "Rate limit exceeded. Please try again later."

      # CORS (centralizado no gateway)
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:8000"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - Accept
            - X-Request-Id
            - X-Stripe-Signature
          exposed_headers:
            - X-RateLimit-Limit-Minute
            - X-RateLimit-Remaining-Minute
            - X-Kong-Request-Id
          credentials: true
          max_age: 3600
          preflight_continue: false

      # Request Size Limit (protege contra payloads abusivos)
      - name: request-size-limiting
        config:
          allowed_payload_size: 50
          size_unit: megabytes
          require_content_length: false

      # Request/Response logging (dev — desabilitar em produção)
      - name: file-log
        config:
          path: /dev/stdout
          reopen: false

      # Correlation ID (rastreamento de requests)
      - name: correlation-id
        config:
          header_name: X-Request-Id
          generator: uuid#counter
          echo_downstream: true

  # ── Keycloak (Auth Server) ───────────────────────────────────────────────
  - name: crivo-auth
    url: http://keycloak:8080
    connect_timeout: 10000
    write_timeout: 30000
    read_timeout: 30000
    retries: 1

    routes:
      # Login / OpenID Connect / Account
      - name: keycloak-auth
        paths:
          - /auth
        strip_path: true
        preserve_host: false
        protocols:
          - http
          - https

      # Keycloak Admin Console
      - name: keycloak-admin
        paths:
          - /admin
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https

    plugins:
      # Rate Limiting mais restritivo para auth (anti brute-force)
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          error_code: 429
          error_message: "Too many authentication attempts. Please wait."

# ══════════════════════════════════════════════════════════════════════════════
# Global Plugins — Aplicados a TODAS as rotas
# ══════════════════════════════════════════════════════════════════════════════

plugins:
  # Bot Detection (bloqueia scrapers conhecidos)
  - name: bot-detection
    config:
      deny:
        - "Scrapy"
        - "SemrushBot"
        - "AhrefsBot"
        - "MJ12bot"

  # IP Restriction (exemplo — descomente para whitelist)
  # - name: ip-restriction
  #   config:
  #     allow:
  #       - "127.0.0.1"
  #       - "::1"
  #     status: 403
  #     message: "Access forbidden"

  # Response Transformer (headers de segurança)
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"
          - "X-XSS-Protection: 1; mode=block"
          - "Referrer-Policy: strict-origin-when-cross-origin"
          - "Permissions-Policy: camera=(), microphone=(), geolocation=()"
